services:
  postgres:
    image: postgres:17-alpine
    container_name: gitdevelop-postgres
    environment:
      POSTGRES_DB: VCS_X
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d VCS_X"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: gitdevelop-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: gitdevelop-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  webapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gitdevelop-webapi
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__VCS-X: Host=postgres;Port=5432;Database=VCS_X;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379,abortConnect=false
      Minio__Endpoint: minio:9000
      Minio__AccessKey: minioadmin
      Minio__SecretKey: minioadmin
      Minio__BucketName: vcsdevelop
      Minio__Secure: "false"
      Http__UseHttpsRedirection: "false"
    ports:
      - "5050:8080"

volumes:
  postgres_data:
  redis_data:
  minio_data:
