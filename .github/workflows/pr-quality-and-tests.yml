name: PR Quality & Tests

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - "src/**"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - ".editorconfig"
      - ".github/workflows/pr-quality-and-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend dependencies
        run: dotnet restore src/VcsDevelop.WebApi/VcsDevelop.WebApi.csproj

      - name: Build backend
        run: >
          dotnet build src/VcsDevelop.WebApi/VcsDevelop.WebApi.csproj
          --configuration Release
          --no-restore
          /p:TreatWarningsAsErrors=true
          /p:EnforceCodeStyleInBuild=true

      - name: Verify backend formatting
        run: dotnet format src/VcsDevelop.WebApi/VcsDevelop.WebApi.csproj --verify-no-changes --severity warn

      - name: Discover test projects
        id: tests
        shell: bash
        run: |
          mapfile -t test_projects < <(find . -name '*Tests.csproj' -o -name '*Test.csproj')
          if [ "${#test_projects[@]}" -eq 0 ]; then
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_tests=true" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${test_projects[@]}" > test-projects.txt

      - name: Run backend tests
        if: steps.tests.outputs.has_tests == 'true'
        shell: bash
        run: |
          while IFS= read -r project; do
            dotnet test "$project" \
              --configuration Release \
              --no-build \
              --logger "trx;LogFileName=$(basename "${project%.csproj}").trx"
          done < test-projects.txt

      - name: Upload backend test results
        if: always() && steps.tests.outputs.has_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: "**/*.trx"
          if-no-files-found: error

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: src/VcsDevelop.Client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/VcsDevelop.Client/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
